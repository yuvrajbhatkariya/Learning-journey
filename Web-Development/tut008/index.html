<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Paragraph is a BLOCK element</p>
    <a target = "_blank" href="http://www.google.com">a or say link is a INLINE element</a>
    <div>div is a BLOCK element</div>
    <span>span is an INLINE element</span>
</body>
</html>
