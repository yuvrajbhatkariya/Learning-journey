<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution of Exercise: 8</title>
    <style>
        .container {
            width: 900px;
            height: 500px;
            border: 2px solid;
            background-color: rgb(235, 200, 253);
            position: relative;
            /* padding: 50px; */
        }
        .box{
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 80px;
            position: absolute;
            bottom: 0;
            /* animation: ball-x 2s ease-out infinite alternate; */
            /* animation: ball-y 1s ease-out infinite alternate; */
            animation: ball-x 8s infinite alternate,ball-y 1s infinite ease-out alternate;
            /* margin: 50px; */
    
        }
        @keyframes  ball-x{
            from{
                left: 0;
            }
            to{
                left:850px;
            }
        }
        @keyframes  ball-y{
            from{
                bottom: 0;
            }
            to{
                bottom:80%;
            }
        }


    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
