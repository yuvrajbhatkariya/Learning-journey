        .x-wrap {
            animation: moveX 10s ease-in-out infinite alternate forwards;
            position: absolute;
            bottom: 0;
        }

        .box {
            width: 70px;
            height: 70px;
            border-radius: 80px;
            background: red;
            animation: moveY 2s ease-in-out infinite alternate;
        }

        @keyframes moveX {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(1335px);
            }
        }

        @keyframes moveY {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-200px);
            }
        }
    </style>

    <div class="container">
        <div class="x-wrap">
            <div class="box"></div>
