<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise : 6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            /* color: black; */
        }

        /* main navigationbar */

        nav {
            /* border: 2px solid; */
            display: flex;

            /* justify-content: center; */
            justify-content: space-around;
        }

        img {
            height: 100px;
        }

        .logo {
            cursor: pointer;
            font-size: 30px;
            font-weight: 500;
            /* padding: 30px; */
            display: flex;

        }

        .logo div {
            padding: 39px 21px;
        }

        /* List items */
        ul {
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 50px 5px;
            margin-left: -96px;

        }

        li a {
            text-decoration: none;
            color: black;
            cursor: pointer;
        }

        .buy {
            display: flex;

        }

        .buy div:nth-child(1) {
            border: 2px solid black;
            height: 20px;
            margin-top: 38px;
            padding: 6px 21px;
            cursor: pointer;
            margin-right: 20px;
            font-weight: 600;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }

        .eng{
            display: flex;
            color: rgb(99, 99, 99);
        }
        .eng div{
            margin-top: 46px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        i {
            margin-top: 33px;
            font-size: 24px;
            padding: 10px;
            
        }

        /* Whole Conent */
        .conten {
            text-align: center;
            padding: 20px;
        }

        /* Heading */
        div h1 {
            padding: 10px;
        }

        /* content */
        .conten div:nth-child(2) {
            padding: 30px;
            margin: 10px;
            font-size: 25px;
            font-weight: 200;
            color: rgb(61, 61, 61);

        }

        /* download button */
        .button a {
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            background-color: rgb(8, 196, 216);
            color: white;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-weight: 600;
        }



        .foot {
            position: fixed;
            bottom: 0;
            text-align: center;
            padding: 10px;
            width: 100%;
            background-color: rgb(219, 235, 249);
        }
    </style>
</head>

<body>
    <div class="head">
        <nav>
            <div class="logo">
                <img src="logo.png" alt="logo">
                <div>UltraEdit</div>
            </div>
            <div class="list">
                <ul>
                    <li><a href="">Products</a></li>
                    <li><a href="">Pricing</a></li>
                    <li><a href="">Resources</a></li>
                    <li><a href="">Our Company</a></li>
                </ul>
            </div>
            <div class="buy">
                <div>BUY NOW</div>
                <div class="eng">
                    <i class="fas fa-globe"></i>
                    <div>English</div>
                </div>
            </div>


        </nav>
        <div class="conten">
            <div>
                <h1>Dowload UltraEdit for Windows</h1>
            </div>
            <div>Download and try UltraEdit before you buy it! This download includes the full Windows version of the
                text editor.</div>
            <div class="button">
                <a href="">DOWNLOAD MAC OR LINUX VERSION</a>
            </div>
        </div>
        <div class="foot">footer</div>
    </div>
</body>

</html>
