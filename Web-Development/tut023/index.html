<html lang="en">
<head>

    <title>Display Property</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid black;
            display:inline-block;

        }
        .box1{
            padding:20px;
            margin: 10px;
        }
        .box2{
            /* display: none; */
            /* visibility: hidden; */
            display: inline-flex;
            justify-content: center;
        }
    </style>
</head>
<body>

        Hey ! whats up ?

    <samp class = "box1">I am Good</samp>
    <div class = "box  box1 ">How are you ?</div>
</body>
</html>
