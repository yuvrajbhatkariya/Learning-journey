<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition in CSS</title>
    <style>
        *{
            margin:0;
        }
        .container{
            background-color: aquamarine;
            width: 70vw;
            height: 60vh;
            margin: 30px;
        }
        .box{
            width: 10vw;
            height: 10vh;
            background-color: blueviolet;
            /* transition-property: all; */
            /* transition-property: transform, background-color;
            transition-duration: 3s;
            transition-timing-function: ease-in-out;
            transition-delay: 1s; */
            transition: transform 3s cubic-bezier(0, 1.12, 0.62, 0.76) 1s;
        }
        .trans{
            transform: translatex(30vw) translatey(30vh);
            background-color: rgb(244, 188, 58);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box trans">
            
        </div>
    </div>
</body>
</html>
