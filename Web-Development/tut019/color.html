<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color</title>
    <style>
        .c1{
            color: darkgoldenrod;
        }
        .c2{
            color: #b850e5;
        }
        .c3{
            color: rgb(246, 47, 203);
        }
        .c4{
            color: rgba(33, 103, 25, 0.838);
        }
        .c5{
            color: hsl(39, 100%, 50%)
;
        }
    </style>
</head>
<body>
    <h1>Colors representation is CSS</h1>
    <ol>
        <li class = "c1">Keywords</li>
        <li class = "c2">Hex color code</li>
        <li class = "c3">RGB</li>
        <li class = "c4">RGBA</li>
        <li class = "c5">HSL</li>
    </ol>
</body>
</html>
