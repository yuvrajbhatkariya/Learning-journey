<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media Query</title>
    <style>
        h2 {
            color: rgb(177, 177, 81);
            background-color: aqua;
            padding: 20px;
            border: 2px solid black;
            /* width: auto; */

        }

        .b1 {
            border: 2px solid black;
            padding: 40px;
            background-color: blueviolet;
            color: white;
            margin: 10px;
        }

        .box {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        
        /* Basic media syntax */
        /* @media not|only mediatype and (expressions)
        {
            CSS-Code -
        } */

        @media only screen and (max-width:350px) {
            body {

                .b1 {
                    background-color: rgb(242, 128, 210);
                }

                h2 {
                    color: rgb(0, 0, 0);
                    background-color: rgb(235, 149, 45);
                }

                .box {
                    flex-direction: column;
                }
            }
        }
        @media screen and (orientation:landscape){
            body{
                .b1 {
                    background-color: rgb(148, 244, 164);
                    padding: 50px 115px;
                }

                h2 {
                    color: rgb(0, 0, 0);
                    background-color: rgb(40, 131, 61);
                }
            }
        }

</head>
