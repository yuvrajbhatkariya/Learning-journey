<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container{
            border:2px solid black;
            display: grid;
            grid-template-columns: [first] 80px [second] 80px [third] 80px [fourth];
            grid-template-rows: 80px 80px 80px;
        }
        .item{
            border:2px solid red;
            height:40px;
            /* width: 40px; */
        }
        .i-4{
            grid-row: third/fourth;
            grid-column: first/fourth;
        }
        .i-2{
            grid-row: 1/2;
            grid-column: 2/3;
        }
        .i-6{
            /* grid-row: 1/2;
            grid-column: 2/3; */
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start:2;
            grid-column-end: 3;
        }
    </style>
</head>

<body>
    <div class = "container">
        <div class = "item i-1">1</div>
        <div class = "item i-2">2</div>
        <div class = "item">3</div>
        <div class = "item i-4">4</div>
        <div class = "item">5</div>
        <div class = "item i-6">6</div>
        <div class = "item">7</div>
    </div>
</body>
</html>
